<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fundo vermelho -->
  <circle cx="50" cy="50" r="45" fill="#FF4560" />
  <!-- Cone branco -->
  <polygon points="50,20 70,75 30,75" fill="#FFFFFF" />
  <!-- Base do cone -->
  <rect x="25" y="70" width="50" height="8" rx="2" fill="#FFFFFF" />
  <!-- Listra vermelha -->
  <rect x="45" y="35" width="10" height="20" fill="#FF4560" />
</svg>